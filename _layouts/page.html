---
layout: default
---

<div style="max-width: 780px; margin: 0 auto;">

  <h1 style="font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 500; color: var(--text-primary); margin-bottom: 24px; padding-bottom: 20px; border-bottom: 0.5px solid var(--border);">
    {{ page.title }}
  </h1>

  <div class="article-body">
    {{ content }}
  </div>

</div>

<style>
  .article-body {
    font-size: 17px;
    color: #c8b8b8;
    line-height: 1.8;
  }

  .article-body p { margin-bottom: 22px; }

  .article-body h2 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--text-primary);
    margin: 36px 0 16px;
  }

  .article-body a {
    color: var(--brand-red);
    text-decoration: underline;
  }

  .article-body strong {
    color: var(--text-primary);
    font-weight: 500;
  }
</style>
